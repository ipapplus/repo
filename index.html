<style>

  --input-bg:#1a1a28; --input-border:#2a2a3a;
  --badge-bg:#1e1e2e;
}
[data-theme="light"] {
  --bg:#f4f4f0; --surface:#ececea; --card:#ffffff;
  --border:#00000010; --text:#111; --muted:#888;
  --header-bg:#f4f4f0cc;
  --input-bg:#e8e8e4; --input-border:#ccc;
  --badge-bg:#e0e0dc;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

header{
  padding:14px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  position:sticky;top:0;background:var(--header-bg);
  backdrop-filter:blur(20px);z-index:200;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;flex-shrink:0;color:var(--text);}
.logo span{color:var(--accent);}

nav{display:flex;gap:6px;flex-shrink:0;}
.tab{
  padding:7px 16px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  transition:all .2s;white-space:nowrap;
}
.tab.active,.tab:hover{background:var(--accent);color:#000;border-color:var(--accent);}

.search-wrap{display:flex;gap:6px;flex:1;max-width:320px;margin-right:0;margin-left:auto;}
#search-input{
  flex:1;padding:8px 12px;background:var(--input-bg);
  border:1px solid var(--input-border);border-radius:8px;
  color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;
  outline:none;transition:border .2s;min-width:0;
}
#search-input:focus{border-color:var(--accent);}
.btn-search{
  padding:8px 14px;background:var(--accent);color:#000;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;

}

.controls{display:flex;gap:6px;flex-shrink:0;}
.ctrl-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  background:var(--badge-bg);color:var(--text);font-size:16px;

}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}

.genres-wrap{

.genre-chip{

.card{

.row-section{padding:0 24px 8px;}
.row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.row-title{font-size:16px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;}

.pagination{margin-top:28px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}

<script>
const TMDB_KEY  = '187c9edd9528b9cd40d59450355bf5be';
const IMG       = 'https://image.tmdb.org/t/p/w342';
const MAX_RECENT = 20;
const STREAM    = 'https://streamimdb.ru/embed';

let isMini = false;

function openPlayer(imdbId, title, type) {
  const url    = `${STREAM}/${type}/${imdbId}`;
  const iframe = document.getElementById('player-iframe');
  const loader = document.getElementById('player-loader');
  document.getElementById('player-title').textContent = title;
  loader.style.display = 'flex';
  iframe.src = url;
  isMini = false;
  const overlay = document.getElementById('player-overlay');
  const container = document.getElementById('player-container');
  overlay.classList.remove('mini');
  overlay.classList.add('open');
  container.style.cssText = '';
  document.body.style.overflow = 'hidden';
}

function closePlayer() {
  document.getElementById('player-iframe').src = '';
  document.getElementById('player-overlay').classList.remove('open','mini');
  document.body.style.overflow = '';
  isMini = false;
}

function toggleMini() {
  const overlay   = document.getElementById('player-overlay');
  const container = document.getElementById('player-container');
  const btn       = document.getElementById('player-mini');
  isMini = !isMini;
  if(isMini) {
    overlay.classList.add('mini');
    document.body.style.overflow = '';
    btn.textContent = '⛶';
    btn.title = 'Maximize';
  } else {
    overlay.classList.remove('mini');
    container.style.cssText = '';
    document.body.style.overflow = 'hidden';
    btn.textContent = '⊡';
    btn.title = 'Minimize';
  }
}

document.getElementById('player-overlay').addEventListener('click', function(e){
  if(!isMini && e.target === this) closePlayer();
});

document.addEventListener('keydown', e => { if(e.key==='Escape') closePlayer(); });

(function(){
  const container = document.getElementById('player-container');
  let dragging = false, startX, startY, origL, origT;

  container.addEventListener('mousedown', startDrag);
  container.addEventListener('touchstart', startDrag, {passive:true});

  function startDrag(e) {
    if(!isMini) return;
    if(e.target.closest('.player-btn')||e.target.closest('#resize-handle')) return;
    dragging = true;
    const rect = container.getBoundingClientRect();
    const cx   = e.touches ? e.touches[0].clientX : e.clientX;
    const cy   = e.touches ? e.touches[0].clientY : e.clientY;
    startX = cx; startY = cy;
    origL  = rect.left; origT = rect.top;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('touchmove', onDrag, {passive:false});
    document.addEventListener('mouseup',   endDrag);
    document.addEventListener('touchend',  endDrag);
  }

  function onDrag(e) {
    if(!dragging) return;
    if(e.cancelable) e.preventDefault();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const dx = cx - startX, dy = cy - startY;
    const W  = window.innerWidth, H = window.innerHeight;
    const cw = container.offsetWidth, ch = container.offsetHeight;
    const l  = Math.max(0, Math.min(W-cw, origL+dx));
    const t  = Math.max(0, Math.min(H-ch, origT+dy));
    container.style.left   = l+'px';
    container.style.top    = t+'px';
    container.style.bottom = 'auto';
    container.style.right  = 'auto';
  }

  function endDrag() {
    dragging = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('mouseup',   endDrag);
    document.removeEventListener('touchend',  endDrag);
  }
})();

(function(){
  const handle    = document.getElementById('resize-handle');
  const container = document.getElementById('player-container');
  let resizing = false, startX, startY, origW, origH;

  handle.addEventListener('mousedown', startResize);
  handle.addEventListener('touchstart', startResize, {passive:true});

  function startResize(e) {
    e.stopPropagation();
    resizing = true;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    startX = cx; startY = cy;
    origW  = container.offsetWidth;
    origH  = container.offsetHeight;
    document.addEventListener('mousemove', onResize);
    document.addEventListener('touchmove', onResize, {passive:false});
    document.addEventListener('mouseup',   endResize);
    document.addEventListener('touchend',  endResize);
  }

  function onResize(e) {
    if(!resizing) return;
    if(e.cancelable) e.preventDefault();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const w  = Math.max(220, Math.min(window.innerWidth-20,  origW+(cx-startX)));
    const h  = Math.max(140, Math.min(window.innerHeight-20, origH+(cy-startY)));
    container.style.width  = w+'px';
    container.style.height = h+'px';
  }

  function endResize() {
    resizing = false;
    document.removeEventListener('mousemove', onResize);
    document.removeEventListener('touchmove', onResize);
    document.removeEventListener('mouseup',   endResize);
    document.removeEventListener('touchend',  endResize);
  }
})();

const $ = id => document.getElementById(id);

function getFavs()    { try{return JSON.parse(localStorage.getItem('cinema_favs')||'[]');}catch{return[];} }
function getRecent()  { try{return JSON.parse(localStorage.getItem('cinema_recent')||'[]');}catch{return[];} }
function saveFavs(a)  { localStorage.setItem('cinema_favs',   JSON.stringify(a)); }
function saveRecent(a){ localStorage.setItem('cinema_recent', JSON.stringify(a)); }

function toggleFav(item, btn) {
  let favs = getFavs();
  const idx = favs.findIndex(f => String(f.id)===String(item.id) && f._t===item._t);
  if(idx===-1) {
    favs.unshift(item);
    saveFavs(favs);
    btn.textContent='❤️'; btn.classList.add('active');
  } else {
    favs.splice(idx,1);
    saveFavs(favs);
    btn.textContent='🤍'; btn.classList.remove('active');
    if(activeTab==='favorites') renderFavorites();
  }
}

function renderFavorites() {
  const favs = getFavs();
  const grid = $('favorites-grid');
  if(!favs.length) {
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1">
      <span style="font-size:48px;display:block;margin-bottom:12px">🤍</span>
      Nothing in your favorites yet
    </div>`;
    return;
  }
  grid.innerHTML = favs.map(item => {
    if(!item.poster_path && item.poster) item.poster_path = item.poster;
    return buildCard(item, item.imdbId, item._t);
  }).join('');
}

function addToRecent(item) {
  let recent = getRecent();
  recent = recent.filter(r => !(r.id===item.id && r._t===item._t));
  recent.unshift(item);
  if(recent.length > MAX_RECENT) recent = recent.slice(0, MAX_RECENT);
  saveRecent(recent);
  renderRecentRow();
}

function removeFromRecent(id, type, ev) {
  if(ev){ ev.preventDefault(); ev.stopPropagation(); }
  saveRecent(getRecent().filter(r => !(r.id===id && r._t===type)));
  renderRecentRow();
}

function clearRecent() {
  saveRecent([]);
  renderRecentRow();
}

function renderRecentRow() {
  const recent = getRecent();
  const row    = $('recent-row');
  const scroll = $('recent-scroll');
  if(!recent.length){ row.style.display='none'; return; }
  row.style.display='block';
  scroll.innerHTML = recent.map(item => {
    const title  = item.title || item.name || '—';
    const poster = item.poster_path || item.poster || null;
    const link   = item.imdbId
      ? `https://www.playimdb.com/title/${item.imdbId}/`
      : `https://www.themoviedb.org/${item._t}/${item.id}`;
    const stored = encodeItem(item);
    return `<a class="h-card" href="${link}" target="_blank" rel="noopener"
        onclick="if('${item.imdbId}'&&'${item.imdbId}'!=='null'){event.preventDefault();addToRecent(decodeItem(this.dataset.item));openPlayer('${item.imdbId}','${(item.title||item.name||'').replace(/'/g,"\\'")}','${item._t}');}" data-item="${stored}">
      ${poster
        ? `<img src="${IMG}${poster}" alt="${title}" loading="lazy">`
        : `<div class="h-card-ph">🎬</div>`}
      <button class="h-card-remove" onclick="removeFromRecent(${item.id},'${item._t}',event)">✕</button>
      <div class="h-card-info"><div class="h-card-title">${title}</div></div>
    </a>`;
  }).join('');
}

function encodeItem(item) {
  return encodeURIComponent(JSON.stringify(item));
}
function decodeItem(str) {
  return JSON.parse(decodeURIComponent(str));
}

async function tmdb(endpoint, params={}) {
  const url = new URL('https://api.themoviedb.org/3'+endpoint);
  url.searchParams.set('api_key', TMDB_KEY);
  url.searchParams.set('language', 'en-US');
  for(const [k,v] of Object.entries(params)) url.searchParams.set(k,v);
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

async function getImdbId(id, type) {
  const ck=type+id;
  if(imdbCache[ck]!==undefined) return imdbCache[ck];
  try {
    const d=await tmdb(`/${type}/${id}/external_ids`);
    imdbCache[ck]=d.imdb_id||null; return d.imdb_id||null;
  } catch { imdbCache[ck]=null; return null; }
}

function genreName(ids) {
  if(!ids||!ids.length) return '';
  const g=[...MOVIE_GENRES,...TV_GENRES].find(x=>x.id===ids[0]);
  return g?g.en:'';
}

function formatDate(str) {
  if(!str) return '';
  const d=new Date(str); if(isNaN(d)) return str.slice(0,4);
  return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
}

function buildCard(item, imdbId, type) {
  if(!item.poster_path && item.poster) item.poster_path = item.poster;

  const link  = imdbId ? `https://www.playimdb.com/title/${imdbId}/` : `https://www.themoviedb.org/${type}/${item.id}`;
  const title = item.title||item.name||'—';
  const date  = item.release_date||item.first_air_date||'';
  const rat   = item.vote_average ? item.vote_average.toFixed(1) : '';
  const genre = genreName(item.genre_ids);
  const typeBadge = type==='tv'?`<div class="badge badge-type">Series</div>`:'';
  const favs  = getFavs();
  const inFav = favs.some(f=>f.id===item.id&&f._t===type);

  const stored = encodeItem({
    id:item.id, _t:type,
    title:item.title, name:item.name,
    poster:item.poster_path,
    imdbId:imdbId,
    release_date:item.release_date,
    first_air_date:item.first_air_date,
    vote_average:item.vote_average,
    genre_ids:item.genre_ids
  });

  return `<a class="card" href="${link}" target="_blank" rel="noopener"
      onclick="if('${imdbId}'!=='null'&&'${imdbId}'!==''){event.preventDefault();addToRecent(decodeItem(this.dataset.item));openPlayer('${imdbId}','${title.replace(/'/g,"\\'")}','${type}');}"
      data-item="${stored}">
    ${item.poster_path
      ? `<img src="${IMG}${item.poster_path}" alt="${title}" loading="lazy">`
      : `<div class="card-ph">🎬</div>`}
    ${rat?`<div class="badge badge-rating">⭐ ${rat}</div>`:''}
    ${typeBadge}
    <button class="fav-btn ${inFav?'active':''}" data-id="${item.id}" data-type="${type}"
      onclick="event.preventDefault();event.stopPropagation();toggleFav(decodeItem(this.closest('.card').dataset.item),this)">
      ${inFav?'❤️':'🤍'}
    </button>
    <div class="card-info">
      <div class="card-title">${title}</div>
      <div class="card-meta">
        ${date  ?`<span class="card-year">${formatDate(date)}</span>`:''}
        ${genre ?`<span class="card-genre">${genre}</span>`:''}
      </div>
    </div>
  </a>`;
}

function loader(){ return `<div class="loader"><div class="spinner"></div></div>`; }

function renderPages(total, current, fn, cid) {
  const el=$(cid); el.innerHTML='';
  for(let i=1;i<=Math.min(total,10);i++){
    const b=document.createElement('button');
    b.className='page-btn'+(i===current?' active':'');
    b.textContent=i; b.onclick=()=>fn(i); el.appendChild(b);
  }
}

function renderGenres() {
  const genres = activeTab==='series'?TV_GENRES:MOVIE_GENRES;
  const bar=$('genres-bar');
  bar.innerHTML=`<button class="genre-chip${activeGenre===0?' active':''}" onclick="selectGenre(0)">All</button>`;
  genres.forEach(g=>{
    bar.innerHTML+=`<button class="genre-chip${activeGenre===g.id?' active':''}" onclick="selectGenre(${g.id})">${g.en}</button>`;
  });
}

function selectGenre(id){
  activeGenre=id; renderGenres();
  if(activeTab==='movies') loadMovies(1);
  else if(activeTab==='series') loadSeries(1);
}

async function loadMovies(pg) {
  localStorage.setItem('cinema_page', pg);
  const grid=$('movies-grid'); grid.innerHTML=loader(); $('movies-pages').innerHTML='';
  try {
    const params={primary_release_year:2026,sort_by:'popularity.desc',page:pg};
    if(activeGenre) params.with_genres=activeGenre;
    const d=await tmdb('/discover/movie',params);
    const ids=await Promise.all(d.results.map(m=>getImdbId(m.id,'movie')));
    grid.innerHTML=d.results.map((m,i)=>buildCard(m,ids[i],'movie')).join('')
      ||`<div class="empty">No results</div>`;
    renderPages(d.total_pages,pg,loadMovies,'movies-pages');
  } catch(e){ grid.innerHTML=`<div class="empty">Load error: ${e.message}</div>`; }
}

async function loadSeries(pg) {
  localStorage.setItem('cinema_page', pg);
  const grid=$('series-grid'); grid.innerHTML=loader(); $('series-pages').innerHTML='';
  try {
    const params={first_air_date_year:2026,sort_by:'popularity.desc',page:pg};
    if(activeGenre) params.with_genres=activeGenre;
    const d=await tmdb('/discover/tv',params);
    const ids=await Promise.all(d.results.map(s=>getImdbId(s.id,'tv')));
    grid.innerHTML=d.results.map((s,i)=>buildCard(s,ids[i],'tv')).join('')
      ||`<div class="empty">No results</div>`;
    renderPages(d.total_pages,pg,loadSeries,'series-pages');
  } catch(e){ grid.innerHTML=`<div class="empty">Load error: ${e.message}</div>`; }
}

async function doSearch() {
  const q=$('search-input').value.trim(); if(!q) return;
  showSection('search-results');
  $('search-label').textContent=`Results: "${q}"`;
  const grid=$('search-grid'); grid.innerHTML=loader();
  try {
    const [mv,tv]=await Promise.all([
      tmdb('/search/movie',{query:q}),
      tmdb('/search/tv',  {query:q})
    ]);
    const combined=[
      ...mv.results.map(m=>({...m,_t:'movie'})),
      ...tv.results.map(s=>({...s,_t:'tv'}))
    ].sort((a,b)=>b.popularity-a.popularity);
    const ids=await Promise.all(combined.map(x=>getImdbId(x.id,x._t)));
    grid.innerHTML=combined.length
      ? combined.map((x,i)=>buildCard(x,ids[i],x._t)).join('')
      : `<div class="empty">No results</div>`;
  } catch(e){ grid.innerHTML=`<div class="empty">Error: ${e.message}</div>`; }
}

function switchTab(tab) {
  activeTab=tab; activeGenre=0;
  localStorage.setItem('cinema_tab', tab);
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $('tab-'+tab)?.classList.add('active');
  showSection(tab);
  $('search-input').value='';
  if(tab==='favorites'){
    $('genres-bar').style.display='none';
    renderFavorites(); return;
  }
  $('genres-bar').style.display='flex';
  renderGenres();
  const savedPage = parseInt(localStorage.getItem('cinema_page')||'1');
  if(tab==='movies') loadMovies(savedPage);
  if(tab==='series') loadSeries(savedPage);
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}

function toggleTheme() {
  theme=theme==='dark'?'light':'dark';
  localStorage.setItem('cinema_theme',theme);
  document.body.setAttribute('data-theme',theme);
  $('theme-btn').textContent=theme==='dark'?'☀️':'🌙';
}

async function fillSeoList() {
  try {
    const d=await tmdb('/discover/movie',{primary_release_year:2026,sort_by:'popularity.desc'});
    const list=$('seo-list');
    if(list) list.innerHTML=d.results
      .map(m=>`<li>${m.title} - ${m.original_title} - watch free online - ver gratis</li>`)
      .join('');
  } catch(e){}
}

document.body.setAttribute('data-theme',theme);
$('theme-btn').textContent = theme==='dark'?'☀️':'🌙';

renderRecentRow();
fillSeoList();

const savedTab  = localStorage.getItem('cinema_tab')  || 'movies';
const savedPage = parseInt(localStorage.getItem('cinema_page') || '1');
activeTab = savedTab;
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
$('tab-'+savedTab)?.classList.add('active');
showSection(savedTab);

if(savedTab==='favorites'){
  $('genres-bar').style.display='none';
  renderFavorites();
} else {
  $('genres-bar').style.display='flex';
  renderGenres();
  if(savedTab==='movies') loadMovies(savedPage);
  if(savedTab==='series') loadSeries(savedPage);
}
</script>
