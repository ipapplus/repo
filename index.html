<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>a7m.dev | المطور أحمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.65);
            --accent-primary: #38bdf8;
            --accent-secondary: #8b5cf6;
            --text-main: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            --shadow-accent: 0 8px 20px -5px rgba(56, 189, 248, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 85% 85%, rgba(139, 92, 246, 0.12) 0%, transparent 50%),
                linear-gradient(180deg, rgba(15, 23, 42, 1) 0%, rgba(30, 41, 59, 1) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 22px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 35px rgba(56, 189, 248, 0.28), inset 0 0 0 2px rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .profile-img:hover {
            transform: scale(1.06) rotate(2deg);
            border-color: var(--accent-primary);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.4);
        }

        .status-indicator {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            background: var(--success);
            border-radius: 50%;
            border: 3px solid var(--bg-secondary);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
            animation: pulse 2s infinite;
        }

        h1 {
            color: var(--text-main);
            font-size: 2.1rem;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .title-bio {
            color: var(--text-secondary);
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .title-bio i {
            color: var(--accent-primary);
            font-size: 1.1rem;
        }

        .audio-visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 5px;
            height: 22px;
            margin: -15px 0 25px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .audio-visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 4px;
            background: linear-gradient(to top, var(--accent-primary), var(--accent-secondary));
            border-radius: 3px;
            animation: soundWave 1.2s infinite ease-in-out;
        }

        .bar:nth-child(1) { height: 8px; animation-delay: 0.1s; }
        .bar:nth-child(2) { height: 15px; animation-delay: 0.2s; }
        .bar:nth-child(3) { height: 22px; animation-delay: 0.3s; }
        .bar:nth-child(4) { height: 14px; animation-delay: 0.4s; }
        .bar:nth-child(5) { height: 10px; animation-delay: 0.5s; }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 13px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 17px 22px;
            border-radius: 16px;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transition: left 0.6s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-3px);
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-accent);
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 2;
        }

        .btn-icon {
            font-size: 1.25rem;
            width: 26px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .link-btn:hover .btn-icon {
            transform: scale(1.1);
        }

        .btn-arrow {
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .link-btn:hover .btn-arrow {
            transform: translateX(-6px);
            color: var(--accent-primary);
        }

        .btn-sileo .btn-icon { color: #38bdf8; }
        .btn-twitter .btn-icon { color: #1da1f2; }
        .btn-github .btn-icon { color: #ffffff; }
        .btn-more { 
            cursor: pointer; 
            background: rgba(56, 189, 248, 0.07); 
            border-color: rgba(56, 189, 248, 0.15);
        }
        .btn-more:hover { 
            background: rgba(56, 189, 248, 0.12); 
        }

        .extra-content {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0, 1, 0, 1);
            opacity: 0;
            margin-top: 0;
        }

        .extra-content.active {
            max-height: 320px;
            opacity: 1;
            margin-top: 18px;
        }

        .footer {
            margin-top: 35px;
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0.7;
            font-weight: 400;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
            }
            50% {
                box-shadow: 0 0 18px rgba(16, 185, 129, 0.6);
            }
        }

        @keyframes soundWave {
            0%, 100% {
                transform: scaleY(0.6);
                opacity: 0.7;
            }
            50% {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        @media (max-width: 400px) {
            .card {
                padding: 35px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
