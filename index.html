<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Watch latest 2026 movies and series free">
<meta name="keywords" content="movies 2026, series 2026, free movies, watch online, action movies, horror movies, comedy movies">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://fareeddoings-dev.github.io/free-cinema">

<meta property="og:title" content="Free Cinema">
<meta property="og:description" content="Latest 2026 movies & series">
<meta property="og:url" content="https://fareeddoings-dev.github.io/free-cinema">
<meta property="og:type" content="website">

<title>Free Cinema</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#080810; --surface:#0f0f1a; --card:#13131e;
  --border:#ffffff0e; --text:#efefef; --muted:#666;
  --accent:#f0c040;
  --header-bg:#080810cc;
  --input-bg:#1a1a28; --input-border:#2a2a3a;
  --badge-bg:#1e1e2e;
}
[data-theme="light"] {
  --bg:#f4f4f0; --surface:#ececea; --card:#ffffff;
  --border:#00000010; --text:#111; --muted:#888;
  --header-bg:#f4f4f0cc;
  --input-bg:#e8e8e4; --input-border:#ccc;
  --badge-bg:#e0e0dc;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:0.3s;}

header{
  padding:14px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  position:sticky;top:0;background:var(--header-bg);
  backdrop-filter:blur(20px);z-index:200;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;}
.logo span{color:var(--accent);}

nav{display:flex;gap:6px;}
.tab{
  padding:7px 16px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:700;
  border:1px solid var(--border);background:transparent;color:var(--muted);
}
.tab.active,.tab:hover{background:var(--accent);color:#000;}

.search-wrap{display:flex;gap:6px;flex:1;max-width:320px;margin-left:auto;}
#search-input{
  flex:1;padding:8px 12px;background:var(--input-bg);
  border:1px solid var(--input-border);border-radius:8px;
  color:var(--text);font-size:13px;outline:none;
}
.btn-search{
  padding:8px 14px;background:var(--accent);color:#000;
  border:none;border-radius:8px;font-weight:700;cursor:pointer;
}

.ctrl-btn{
  width:36px;height:36px;border-radius:8px;
  border:1px solid var(--border);
  background:var(--badge-bg);color:var(--text);
  cursor:pointer;
}

main{padding:24px;}

.section{display:none;}
.section.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:14px;
}

.card{
  display:block;text-decoration:none;color:inherit;
  border-radius:12px;overflow:hidden;
  background:var(--card);border:1px solid var(--border);
  transition:0.2s;
}
.card:hover{transform:scale(1.04);}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;}

.card-info{padding:10px;}
.card-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.fav-btn{
  position:absolute;bottom:48px;left:8px;
  width:28px;height:28px;border-radius:50%;
  background:#000000aa;border:none;
  cursor:pointer;
}

.loader{display:flex;justify-content:center;padding:60px;}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#player-overlay{
  display:none;position:fixed;inset:0;z-index:1000;
  background:#000000bb;backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
}
#player-overlay.open{display:flex;}

#player-container{
  width:90%;max-width:900px;height:75vh;
  background:#0a0a0f;border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;
}

#player-topbar{
  padding:10px;display:flex;align-items:center;gap:10px;
}
#player-title{flex:1;color:#fff;font-weight:700;}

.player-btn{
  width:32px;height:32px;border-radius:50%;
  border:none;background:#ffffff22;color:#fff;cursor:pointer;
}

#player-wrap{flex:1;background:#000;}
#player-wrap iframe{width:100%;height:100%;border:none;}
</style>
</head>

<body data-theme="dark">

<header>
  <div class="logo">FREE CINEMA</div>

  <nav>
    <button class="tab active" onclick="switchTab('movies')">Movies</button>
    <button class="tab" onclick="switchTab('series')">Series</button>
    <button class="tab" onclick="switchTab('favorites')">Favorites</button>
  </nav>

  <div class="search-wrap">
    <input id="search-input" placeholder="Search..." onkeydown="if(event.key==='Enter')doSearch()"/>
    <button class="btn-search" onclick="doSearch()">Search</button>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="toggleTheme()">☀️</button>
  </div>
</header>

<main>
  <div class="section active" id="movies">
    <div class="grid" id="movies-grid"></div>
  </div>

  <div class="section" id="series">
    <div class="grid" id="series-grid"></div>
  </div>

  <div class="section" id="favorites">
    <div class="grid" id="favorites-grid"></div>
  </div>
</main>

<div id="player-overlay">
  <div id="player-container">
    <div id="player-topbar">
      <button class="player-btn" onclick="closePlayer()">✕</button>
      <div id="player-title"></div>
    </div>
    <div id="player-wrap">
      <iframe id="player-iframe"></iframe>
    </div>
  </div>
</div>

<script>
const TMDB_KEY='187c9edd9528b9cd40d59450355bf5be';
const IMG='https://image.tmdb.org/t/p/w342';
const STREAM='https://streamimdb.ru/embed';

let activeTab='movies';

function $(id){return document.getElementById(id);}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  $(tab).classList.add('active');
}

async function tmdb(url){
  const r=await fetch(`https://api.themoviedb.org/3${url}?api_key=${TMDB_KEY}`);
  return r.json();
}

function buildCard(item,type){
  const title=item.title||item.name;
  return `<a class="card" onclick="openPlayer('${item.id}','${title}','${type}')">
    <img src="${IMG}${item.poster_path}">
    <div class="card-info"><div class="card-title">${title}</div></div>
  </a>`;
}

async function loadMovies(){
  const d=await tmdb('/discover/movie&sort_by=popularity.desc');
  $('movies-grid').innerHTML=d.results.map(m=>buildCard(m,'movie')).join('');
}

async function loadSeries(){
  const d=await tmdb('/discover/tv&sort_by=popularity.desc');
  $('series-grid').innerHTML=d.results.map(s=>buildCard(s,'tv')).join('');
}

function doSearch(){}

function openPlayer(id,title,type){
  $('player-title').textContent=title;
  $('player-iframe').src=`${STREAM}/${type}/${id}`;
  $('player-overlay').classList.add('open');
}

function closePlayer(){
  $('player-overlay').classList.remove('open');
  $('player-iframe').src='';
}

function toggleTheme(){
  document.body.dataset.theme =
    document.body.dataset.theme==='dark'?'light':'dark';
}

loadMovies();
loadSeries();
</script>

</body>
</html>
