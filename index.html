<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Cinema | 2026 Movies</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#080810; --surface:#0f0f1a; --card:#13131e;
            --border:#ffffff0e; --text:#efefef; --muted:#666;
            --accent:#f0c040; --red:#e05c5c;
            --header-bg:#080810cc;
            --input-bg:#1a1a28; --input-border:#2a2a3a;
            --badge-bg:#1e1e2e;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { 
            padding: 14px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
            position: sticky; top: 0; background: var(--header-bg);
            backdrop-filter: blur(20px); z-index: 200;
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text); }
        .logo span { color: var(--accent); }
        
        nav { display: flex; gap: 6px; }
        .tab { 
            padding: 7px 16px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 700; background: transparent; 
            color: var(--muted); border: 1px solid var(--border); transition: all .2s;
        }
        .tab.active, .tab:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        .search-wrap { display: flex; gap: 6px; flex: 1; max-width: 320px; margin-left: auto; }
        #search-input { 
            flex: 1; padding: 8px 12px; background: var(--input-bg);
            border: 1px solid var(--input-border); border-radius: 8px;
            color: var(--text); outline: none;
        }
        .btn-search { 
            padding: 8px 14px; background: var(--accent); color: #000;
            border: none; border-radius: 8px; cursor: pointer; font-weight: 700;
        }

        main { padding: 24px; }
        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
        }
        .card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            text-decoration: none; color: inherit; border: 1px solid var(--border);
            transition: transform .2s; position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 10px; }
        .card-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Player Overlay */
        #player-overlay { 
            display: none; position: fixed; inset: 0; z-index: 1000; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }
        #player-overlay.open { display: flex; }
        #player-container { width: 90%; max-width: 960px; height: 70vh; background: #000; border-radius: 12px; overflow: hidden; }
        #player-iframe { width: 100%; height: 100%; border: none; }
        .close-player { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">FREE <span>CINEMA</span></div>
    <nav>
        <button class="tab active" onclick="switchTab('movies')">Movies</button>
        <button class="tab" onclick="switchTab('series')">Series</button>
        <button class="tab" onclick="switchTab('favorites')">Favorites</button>
    </nav>
    <div class="search-wrap">
        <input id="search-input" type="search" placeholder="Search movies...">
        <button class="btn-search" onclick="doSearch()">Search</button>
    </div>
</header>

<main>
    <div id="content-grid" class="grid">
        <!-- Content injected here -->
    </div>
</main>

<div id="player-overlay">
    <button class="close-player" onclick="closePlayer()">×</button>
    <div id="player-container">
        <iframe id="player-iframe" allowfullscreen></iframe>
    </div>
</div>

<script>
    const TMDB_KEY = '187c9edd9528b9cd40d59450355bf5be';
    const IMG_PATH = 'https://image.tmdb.org/t/p/w342';
    const STREAM_URL = 'https://streamimdb.ru/embed';

    async function fetchMovies(type = 'movie') {
        const endpoint = type === 'movie' ? '/movie/popular' : '/tv/popular';
        const resp = await fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${TMDB_KEY}&language=en-US&page=1`);
        const data = await resp.json();
        renderGrid(data.results, type);
    }

    function renderGrid(items, type) {
        const grid = document.getElementById('content-grid');
        grid.innerHTML = items.map(item => `
            <div class="card" onclick="playMedia('${item.id}', '${type}')">
                <img src="${IMG_PATH}${item.poster_path}" alt="${item.title || item.name}">
                <div class="card-info">
                    <div class="card-title">${item.title || item.name}</div>
                </div>
            </div>
        `).join('');
    }

    async function playMedia(id, type) {
        // Get IMDB ID
        const extResp = await fetch(`https://api.themoviedb.org/3/${type}/${id}/external_ids?api_key=${TMDB_KEY}`);
        const extData = await extResp.json();
        const imdbId = extData.imdb_id;

        if (imdbId) {
            const overlay = document.getElementById('player-overlay');
            const iframe = document.getElementById('player-iframe');
            iframe.src = `${STREAM_URL}/${type}/${imdbId}`;
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        } else {
            alert('Source not found for this item.');
        }
    }

    function closePlayer() {
        const overlay = document.getElementById('player-overlay');
        const iframe = document.getElementById('player-iframe');
        iframe.src = '';
        overlay.classList.remove('open');
        document.body.style.overflow = '';
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        fetchMovies(tab === 'series' ? 'tv' : 'movie');
    }

    // Initial Load
    fetchMovies();
</script>

</body>
</html>
